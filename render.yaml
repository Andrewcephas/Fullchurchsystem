services:
  - type: web
    name: church-backend
    env: python
    plan: free
    rootDir: .  # Run from repository root
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn church_backend.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "church-backend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: church-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://church-frontend.vercel.app,https://www.church-frontend.vercel.app"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://church-backend.onrender.com"
      - key: SECURE_SSL_REDIRECT
        value: "True"

databases:
  - name: church-db
    databaseName: church_db
    user: church_user
    plan: free
